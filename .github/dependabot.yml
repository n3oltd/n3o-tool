version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      nswag:
        patterns:
          - "NSwag.*"
      mcmaster:
        patterns:
          - "McMaster.*"
    ignore:
      - dependency-name: "Karakoram.*"
      - dependency-name: "K2.*"
      - dependency-name: "N3O.*"
